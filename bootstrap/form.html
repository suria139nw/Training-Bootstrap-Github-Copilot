<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>แบบฟอร์มลงทะเบียนคนไข้</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <style>
    .card { max-width: 760px; margin: 2rem auto; }
  </style>
</head>

<body>
  <div class="container">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">แบบฟอร์มลงทะเบียนคนไข้</h3>
        <form class="needs-validation" novalidate id="patientForm" autocomplete="off">
          <div class="row g-3">
            <div class="col-md-3">
              <label for="prefix" class="form-label">คำนำหน้า</label>
              <select class="form-select" id="prefix" name="prefix" required>
                <option value="">เลือก...</option>
                <option>นาย</option>
                <option>นาง</option>
                <option>นางสาว</option>
                <option>เด็กชาย</option>
                <option>เด็กหญิง</option>
                <option>อื่นๆ</option>
              </select>
              <div class="invalid-feedback">กรุณาเลือกคำนำหน้า</div>
            </div>

            <div class="col-md-4">
              <label for="firstName" class="form-label">ชื่อ</label>
              <input type="text" class="form-control" id="firstName" name="firstName" required minlength="2" />
              <div class="invalid-feedback">กรุณากรอกชื่อ (อย่างน้อย 2 ตัวอักษร)</div>
            </div>

            <div class="col-md-5">
              <label for="lastName" class="form-label">นามสกุล</label>
              <input type="text" class="form-control" id="lastName" name="lastName" required minlength="2" />
              <div class="invalid-feedback">กรุณากรอกนามสกุล (อย่างน้อย 2 ตัวอักษร)</div>
            </div>

            <div class="col-md-4">
              <label class="form-label d-block">เพศ</label>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="genderMale" value="male" required>
                <label class="form-check-label" for="genderMale">ชาย</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="female">
                <label class="form-check-label" for="genderFemale">หญิง</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="genderOther" value="other">
                <label class="form-check-label" for="genderOther">อื่นๆ</label>
              </div>
              <div class="invalid-feedback d-block" id="genderFeedback">กรุณาเลือกเพศ</div>
            </div>

            <div class="col-md-2">
              <label for="age" class="form-label">อายุ</label>
              <input type="number" class="form-control" id="age" name="age" required min="0" max="120">
              <div class="invalid-feedback">กรุณากรอกอายุที่ถูกต้อง (0-120)</div>
            </div>

            <div class="col-md-6">
              <label for="phone" class="form-label">เบอร์โทร</label>
              <input type="tel" class="form-control" id="phone" name="phone" required pattern="[0-9]{9,10}"
                title="ตัวเลขเท่านั้น 9-10 หลัก (เช่น 0812345678)">
              <div class="invalid-feedback">กรุณากรอกเบอร์โทรที่ถูกต้อง (9-10 หลัก)</div>
            </div>

            <div class="col-12 d-flex justify-content-center">
              <button class="btn btn-primary" type="submit">ลงทะเบียน</button>
              <button class="btn btn-secondary" type="reset">ล้างข้อมูล</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script>
    (function () {
      'use strict'

      var form = document.getElementById('patientForm');

      // Bootstrap validation
      form.addEventListener('submit', function (event) {
        // custom check: ensure a gender radio is checked
        var genderChecked = form.querySelector('input[name="gender"]:checked');
        var genderFeedback = document.getElementById('genderFeedback');
        if (!genderChecked) {
          genderFeedback.style.display = 'block';
        } else {
          genderFeedback.style.display = 'none';
        }

        if (!form.checkValidity() || !genderChecked) {
          event.preventDefault();
          event.stopPropagation();
        } else {
          event.preventDefault();
          // Here you can handle the valid form submission (AJAX, fetch, etc.)
          alert('ลงทะเบียนสำเร็จ');
        }
        form.classList.add('was-validated');
      }, false);

      // Hide gender feedback initially
      document.getElementById('genderFeedback').style.display = 'none';
    })();
  </script>
</body>

</html>
